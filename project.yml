name: Boilerplate

options:
  minimumXcodeGenVersion: 2.42.0
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Boilerplate:
    type: application
    platform: iOS
    sources:
      - path: Boilerplate
        excludes:
          - Resources
    resources:
      - path: Boilerplate/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.10x.boilerplate
        PRODUCT_NAME: Boilerplate
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Boilerplate
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  BoilerplateTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BoilerplateTests
    dependencies:
      - target: Boilerplate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.10x.boilerplate.tests
        GENERATE_INFOPLIST_FILE: YES

  BoilerplateUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BoilerplateUITests
    dependencies:
      - target: Boilerplate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.10x.boilerplate.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Boilerplate

schemes:
  Boilerplate:
    build:
      targets:
        Boilerplate: all
    test:
      targets:
        - BoilerplateTests
        - BoilerplateUITests
      gatherCoverageData: false
    run:
      config: Debug
    archive:
      config: Release
